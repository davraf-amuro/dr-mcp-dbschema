name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore dr-mcp-dbschema.sln

      - name: Build
        run: dotnet build dr-mcp-dbschema.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test dr-mcp-dbschema.sln --configuration Release --no-build --verbosity normal

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish linux-x64
        run: >
          dotnet publish dr-mcp-dbschema.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          --output publish/linux-x64

      - name: Publish win-x64
        run: >
          dotnet publish dr-mcp-dbschema.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          --output publish/win-x64

      - name: Create archives
        run: |
          cd publish/win-x64
          zip ../../dr-mcp-dbschema-win-x64.zip dr-mcp-dbschema.exe
          cd ../linux-x64
          tar czf ../../dr-mcp-dbschema-linux-x64.tar.gz dr-mcp-dbschema

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dr-mcp-dbschema-win-x64.zip
            dr-mcp-dbschema-linux-x64.tar.gz
          generate_release_notes: true

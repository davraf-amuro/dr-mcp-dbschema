name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/dr-mcp-dbschema.Tests --configuration Release --no-build --verbosity normal

      - name: Publish win-x64
        run: |
          dotnet publish dr-mcp-dbschema.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            --output publish/win-x64

      - name: Publish linux-x64
        run: |
          dotnet publish dr-mcp-dbschema.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output publish/linux-x64

      - name: Zip win-x64
        run: zip -j publish/dr-mcp-dbschema-win-x64.zip publish/win-x64/dr-mcp-dbschema.exe

      - name: Zip linux-x64
        run: zip -j publish/dr-mcp-dbschema-linux-x64.zip publish/linux-x64/dr-mcp-dbschema

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/dr-mcp-dbschema-win-x64.zip
            publish/dr-mcp-dbschema-linux-x64.zip
          generate_release_notes: true
